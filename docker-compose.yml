services:
  redis:
    image: redis/redis-stack-server
    restart: always
    networks:
      - main

  ldn-server:
    image: ghcr.io/ryubing/ldnserver:latest
    restart: always
    environment:
      LDN_HOST: 0.0.0.0
      LDN_PORT: 30456
      LDN_REDIS_HOST: redis
      LDN_REDIS_PORT: 6379
      IP_BAN_FILE_PATH: /data/ryuldn/bannedips.txt
    volumes:
      - ./data/ryuldn:/data/ryuldn
    ports:
      - "30456:30456"
    depends_on:
      - redis
    networks:
      - main

  ryujinx-ldn-website:
    hostname: ryujinx-ldn-website
    image: ghcr.io/ryubing/ldnwebsite:latest
    restart: always
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      REDIS_URL: "redis://redis:6379"
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - main

networks:
  main:
    name: main
